<!-- chart.html -->
{% extends 'base.html' %}
{% load static %}

{% block content %}
  <h2 style="text-align: center">Vote Results Analytics</h2>
  <div class="container mt-5">
    <canvas id="resultsChart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('resultsChart').getContext('2d');
    const chartData = {
      labels: {{ candidates|safe }},
      datasets: [{
        label: 'Vote Counts',
        data: {{ votes|safe }},
        backgroundColor: ['rgba(227, 0, 58, 1)','rgba(64, 167, 96, 1)','rgba(99, 69, 172, 1)'],
        borderColor: [
        'rgba(255, 99, 132, 1)',     // Red border
        'rgba(54, 162, 235, 1)',     // Blue border
        'rgba(255, 206, 86, 1)'      // Yellow border
    ],
        borderWidth: 1
      }]
    };

    const myChart = new Chart(ctx, {
      type: 'bar',
      data: chartData,
      options: {
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
  </script>
{% endblock %}
