<!-- send_message_status.html -->
{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container pt-5">
    <h2 class="mb-4">Message Sending Status</h2>
    
    {% if status_messages %}
        <div class="alert alert-info">
            <ul class="mb-0">
                {% for message in status_messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        </div>
    {% else %}
        <div class="alert alert-warning">
            No messages were sent.
        </div>
    {% endif %}
    
    <a href="{% url 'sendMessage' %}" class="btn btn-secondary mt-3">Back to Send Messages</a>
</div>
{% endblock %}
